name: Daily Social Post

on:
  schedule:
    # 매일 오전 8시 (KST) = 전날 오후 11시 (UTC)
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      type:
        description: 'Content type to tweet (leave empty for auto)'
        required: false
        type: choice
        options:
          - ''
          - blog
          - fortune
      dry_run:
        description: 'Dry run mode (no tweet posted)'
        required: false
        default: false
        type: boolean

concurrency:
  group: social-posting
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  post-social:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Validate X API keys
        run: |
          MISSING=""
          for KEY in X_CONSUMER_KEY X_SECRET_KEY X_ACCESS_TOKEN X_ACCESS_TOKEN_SECRET; do
            if [ -z "${!KEY}" ]; then
              MISSING="$MISSING $KEY"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "::error::Missing secrets:$MISSING"
            exit 1
          fi
        env:
          X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
          X_SECRET_KEY: ${{ secrets.X_SECRET_KEY }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}

      - name: Check Bluesky API keys
        run: |
          if [ -z "$BLUESKY_HANDLE" ] || [ -z "$BLUESKY_APP_PASSWORD" ]; then
            echo "::warning::Bluesky secrets not configured — Bluesky posting will be skipped"
          fi
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}

      - run: npm ci

      - name: Post to Twitter
        env:
          X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
          X_SECRET_KEY: ${{ secrets.X_SECRET_KEY }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
          INPUT_TYPE: ${{ github.event.inputs.type }}
        run: |
          ARGS=""
          if [ "$INPUT_DRY_RUN" = "true" ]; then
            ARGS="--dry-run"
          fi
          if [ -n "$INPUT_TYPE" ]; then
            ARGS="$ARGS --type $INPUT_TYPE"
          fi
          npx tsx scripts/post-to-twitter.ts $ARGS

      - name: Post to Bluesky
        continue-on-error: true
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
          INPUT_TYPE: ${{ github.event.inputs.type }}
        run: |
          ARGS=""
          if [ "$INPUT_DRY_RUN" = "true" ]; then
            ARGS="--dry-run"
          fi
          if [ -n "$INPUT_TYPE" ]; then
            ARGS="$ARGS --type $INPUT_TYPE"
          fi
          npx tsx scripts/post-to-bluesky.ts $ARGS

      - name: Commit state changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/twitter-post-state.json scripts/bsky-post-state.json
          if git diff --cached --quiet; then
            echo "No state changes to commit"
          else
            git commit -m "chore: update social post state"
            git push
          fi

      - name: Notify failure
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const title = `[Workflow Failure] Daily Social Post - ${new Date().toISOString().split('T')[0]}`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'workflow-failure',
            });
            const existing = issues.find(i => i.title.includes('Daily Social Post'));
            if (!existing) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: `Workflow run failed: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                labels: ['workflow-failure'],
              });
            }

      - name: Auto-close failure issues on success
        if: success()
        uses: actions/github-script@v9
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'workflow-failure',
            });
            for (const issue of issues) {
              if (issue.title.includes('Daily Social Post')) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed',
                  state_reason: 'completed',
                });
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `✅ 파이프라인 복구됨.\nWorkflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                });
              }
            }
